Port 8888
Listen 127.0.0.1
Timeout 60
MaxClients 50
LogLevel Error
LogFile "/tmp/tinyproxy.log"

# Only allow HTTPS CONNECT on standard ports
ConnectPort 443
ConnectPort 80
ConnectPort 7999

# Domain-based allowlist
Filter "/etc/tinyproxy/allowlist"
FilterDefaultDeny Yes
FilterURLs Off
FilterExtended On
